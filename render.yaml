databases:
  - name: pixel-agents-db
    plan: starter
    databaseName: pixel_agents
    user: pixel
    region: frankfurt

services:
  - type: web
    name: pixel-office
    runtime: docker
    region: frankfurt
    plan: standard
    envVars:
      - key: PORT
        value: "3000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pixel-agents-db
          property: connectionString
